name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven Tests
        working-directory: backend
        run: ./mvnw test

  frontend-check:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api
        run: npm run build

  docker-build:
    name: Docker Build (Backend + Frontend)
    needs: [backend-tests, frontend-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (PR validation)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: local/hotel-backend:ci

      - name: Build frontend image (PR validation)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: local/hotel-frontend:ci
          build-args: |
            VITE_API_BASE_URL=/api

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hotel-backend:latest
            ghcr.io/${{ github.repository_owner }}/hotel-backend:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hotel-backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hotel-backend:buildcache,mode=max

      - name: Build and push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hotel-frontend:latest
            ghcr.io/${{ github.repository_owner }}/hotel-frontend:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hotel-frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/hotel-frontend:buildcache,mode=max

  deploy:
    name: Deploy (Render Hooks)
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
    steps:
      - name: Trigger backend deploy hook
        if: env.RENDER_BACKEND_DEPLOY_HOOK != ''
        run: curl -fsS -X POST "${{ env.RENDER_BACKEND_DEPLOY_HOOK }}"

      - name: Trigger frontend deploy hook
        if: env.RENDER_FRONTEND_DEPLOY_HOOK != ''
        run: curl -fsS -X POST "${{ env.RENDER_FRONTEND_DEPLOY_HOOK }}"

  post-deploy-healthcheck:
    name: Post-Deploy Healthcheck
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
    steps:
      - name: Probe health endpoint
        if: env.APP_HEALTHCHECK_URL != ''
        run: |
          echo "Healthcheck URL: ${{ env.APP_HEALTHCHECK_URL }}"
          for i in {1..15}; do
            if curl -fsS "${{ env.APP_HEALTHCHECK_URL }}" | grep -q '"status":"UP"'; then
              echo "Healthcheck passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Healthcheck failed after retries"
          exit 1
