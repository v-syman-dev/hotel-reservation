name: CI/CD (Render)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
        cache: maven

    - name: Build backend (without tests)
      working-directory: backend
      run: |
        chmod +x mvnw
        ./mvnw -B -DskipTests package

    - name: Set up Node 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      working-directory: frontend
      env:
        VITE_API_BASE_URL: /api
      run: |
        npm ci
        npm run build

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "21"
        cache: maven

    - name: Run backend tests
      working-directory: backend
      run: |
        chmod +x mvnw
        ./mvnw -B test

    - name: Set up Node 22
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Run frontend lint
      working-directory: frontend
      run: |
        npm ci
        npm run lint

  deploy:
    name: Deploy
    needs: [ build, test ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_BACKEND_DEPLOY_HOOK: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
      RENDER_FRONTEND_DEPLOY_HOOK: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
    steps:
    - name: Validate deploy hooks
      run: |
        if [ -z "${RENDER_BACKEND_DEPLOY_HOOK}" ] && [ -z "${RENDER_FRONTEND_DEPLOY_HOOK}" ]; then
          echo "Set at least one secret: RENDER_BACKEND_DEPLOY_HOOK or RENDER_FRONTEND_DEPLOY_HOOK"
          exit 1
        fi

    - name: Trigger backend deploy
      if: env.RENDER_BACKEND_DEPLOY_HOOK != ''
      run: curl -fsS -X POST "${{ env.RENDER_BACKEND_DEPLOY_HOOK }}"

    - name: Trigger frontend deploy
      if: env.RENDER_FRONTEND_DEPLOY_HOOK != ''
      run: curl -fsS -X POST "${{ env.RENDER_FRONTEND_DEPLOY_HOOK }}"

  healthcheck:
    name: Healthcheck
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      APP_HEALTHCHECK_URL: ${{ secrets.APP_HEALTHCHECK_URL }}
    steps:
    - name: Validate healthcheck URL
      run: |
        if [ -z "${APP_HEALTHCHECK_URL}" ]; then
          echo "Set APP_HEALTHCHECK_URL secret"
          exit 1
        fi

    - name: Probe app health
      run: |
        echo "Healthcheck URL: ${APP_HEALTHCHECK_URL}"
        for i in {1..15}; do
          if curl -fsS "${APP_HEALTHCHECK_URL}" | grep -q '"status":"UP"'; then
            echo "Healthcheck passed"
            exit 0
          fi
          echo "Attempt ${i}/15 failed, retrying in 10s..."
          sleep 10
        done
        echo "Healthcheck failed after retries"
        exit 1
